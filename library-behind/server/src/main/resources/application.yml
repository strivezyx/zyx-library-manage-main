server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library
    username: root
    password: 123456

# mybatis-plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
